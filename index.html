<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Учебные материалы</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --accent: #6c8ebf;
      --accent-hover: #8baad6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      max-width: 960px;
      margin: 0 auto;
    }

    .section-title {
      max-width: 960px;
      margin: 0 auto 12px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .section-title:not(:first-child) {
      margin-top: 32px;
    }

    .card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(108, 142, 191, 0.15);
      color: var(--accent-hover);
    }

    .empty {
      max-width: 960px;
      margin: 40px auto;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Учебные материалы</h1>
    <p>Интерактивные тренажёры и тесты</p>
  </header>

  <!-- Пример секции (раскомментировать когда добавятся уроки):

      <div class="card-title">Контрольный тест</div>
      <div class="card-desc">60 вопросов, 7 тем, таймер</div>
      <span class="tag">Тест</span>
    </a>
  </div>

  -->

  <div class="empty">Уроки появятся здесь.</div>

</body>
</html>
